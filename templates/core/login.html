{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);">
    <div class="card shadow-lg" style="width: 100%; max-width: 420px; border: none; border-radius: 1rem;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <span class="display-6" style="background: #2563eb; color: white; padding: 0.5rem 1rem; border-radius: 0.75rem;">
                        <i class="bi bi-journal-text"></i>
                    </span>
                </div>
                <h4 class="fw-bold text-dark">GST Accounting</h4>
                <p class="text-muted mb-0">Sign in to your account</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        {{ form.username }}
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        {{ form.password }}
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
