{% extends 'base.html' %}
{% block page_title %}Delete Account{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-5">
<div class="card border-danger">
    <div class="card-header bg-danger text-white"><h6 class="mb-0">Confirm Delete</h6></div>
    <div class="card-body">
        <p>Are you sure you want to delete account <strong>{{ account }}</strong>?</p>
        <p class="text-danger small">This action cannot be undone.</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
            <a href="{% url 'account_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
